name: Update Leaderboard
on:
  schedule:
    - cron: '*/5 10-18 * * *'
    - cron: '0,5,10,15,20,25,30 18 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install requests
      - run: python app/fantasy.py html
      - run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add docs/index.html
          git diff --cached --quiet || (git commit -m "update leaderboard $(date -u '+%Y-%m-%d %H:%M UTC')" && git push)
